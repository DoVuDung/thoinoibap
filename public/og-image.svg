<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f4f1e8"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#922724" stroke-width="4"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#b19470" stroke-width="2"/>
  
  <!-- Top decorative line -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#922724" stroke-width="2"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="serif" font-size="72" font-weight="400" text-anchor="middle" fill="#922724">Thôi Nôi</text>
  <text x="600" y="280" font-family="serif" font-size="96" font-weight="600" text-anchor="middle" fill="#922724">Minh Anh</text>
  
  <!-- Date -->
  <text x="600" y="360" font-family="sans-serif" font-size="36" text-anchor="middle" fill="#4a4a4a">11.03.2026</text>
  
  <!-- Decorative element -->
  <text x="600" y="450" font-size="80" text-anchor="middle">🎂</text>
  
  <!-- Bottom text -->
  <text x="600" y="540" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#b19470">Thân mừ quý vị đến dự</text>
  
  <!-- Corner decorations -->
  <text x="80" y="100" font-size="40" fill="#922724">❦</text>
  <text x="1120" y="100" font-size="40" fill="#922724">❦</text>
  <text x="80" y="580" font-size="40" fill="#922724">❦</text>
  <text x="1120" y="580" font-size="40" fill="#922724">❦</text>
</svg>
