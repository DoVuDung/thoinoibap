<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f4f1e8"/>
  
  <!-- Paper grain texture overlay -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.03"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#b19470" stroke-width="1"/>
  
  <!-- Main title -->
  <text x="600" y="250" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="300" text-anchor="middle" fill="#922724">
    Thôi Nôi Minh Anh
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="330" font-family="'Be Vietnam Pro', Arial, sans-serif" font-size="32" font-weight="300" letter-spacing="8" text-anchor="middle" fill="#4a4a4a">
    BẮP'S FIRST BIRTHDAY
  </text>
  
  <!-- Date line -->
  <text x="600" y="420" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" font-style="italic" text-anchor="middle" fill="#b19470">
    March 11, 2026 — Đà Nẵng
  </text>
  
  <!-- Bottom decorative element -->
  <line x1="450" y1="480" x2="750" y2="480" stroke="#922724" stroke-width="0.5"/>
</svg>
